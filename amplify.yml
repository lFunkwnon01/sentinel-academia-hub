version: 1

frontend:
  phases:
    preBuild:
      commands:
        - cd web
        - npm install
    build:
      commands:
        - npx vite build
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*

# Single Page App: todas las rutas sin extensión deben ser servidas por index.html
# para que Vue Router pueda tomar el control desde el cliente
redirects:
  - source: </^[^.]+$>
    target: /index.html
    status: '200'
