version: 1

frontend:
  phases:
    preBuild:
      commands:
        - cd web
        - npm install
    build:
      commands:
        - npx vite build
    postBuild:
      commands:
        - echo "Build complete"
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*

# SPA fallback: rutas sin extensión -> index.html
# La sintaxis /<*> es la forma estándar de Amplify para catchall
redirects:
  - source: /<*>
    target: /index.html
    status: '404'
