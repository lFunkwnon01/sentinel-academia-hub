version: 1

frontend:
  phases:
    preBuild:
      commands:
        - cd web
        - npm install
    build:
      commands:
        - npx vite build
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*

# Redirigir /path/ a /path (quitar trailing slash) con 301
redirects:
  - source: </^/(.*)/$>
    target: /<>/1
    status: '301'

# SPA fallback: cualquier ruta debe ser servida por index.html
  - source: </^[^.]+$>
    target: /index.html
    status: '200'
