version: 1

frontend:
  phases:
    preBuild:
      commands:
        - npm --prefix web install
    build:
      commands:
        - npx --prefix web vite build
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"

# SPA fallback: cualquier ruta sin extensión debe ser servida por index.html
redirects:
  - source: /<*>
    target: /index.html
    status: '404'
