version: 1

frontend:
  phases:
    preBuild:
      commands:
        - cd web && npm install
    build:
      commands:
        - cd web && npx vite build
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"

# SPA fallback: cualquier ruta sin extensión debe ser servida por index.html
redirects:
  - source: /<*>
    target: /index.html
    status: '404'
