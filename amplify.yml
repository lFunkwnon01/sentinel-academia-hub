version: 1

frontend:
  phases:
    preBuild:
      commands:
        - cd web
        - npm install
    build:
      commands:
        - npx vite build
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*

# SPA fallback: cualquier ruta sin extensión -> index.html (rewrite)
# Usar status 404 con sintaxis simple de Amplify (sin regex compleja)
redirects:
  - source: /<*>
    target: /index.html
    status: '404'
