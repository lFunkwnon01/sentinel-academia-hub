version: 1

frontend:
  phases:
    preBuild:
      commands:
        - cd web
        - npm install
    build:
      commands:
        - npx vite build
  artifacts:
    baseDirectory: web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*

# SPA fallback: cualquier ruta sin extensión debe ser servida por index.html
# Sintaxis: source es una regex delimitada por </>, status 200 sirve index.html
# manteniendo el código 200 al cliente (rewrite).
redirects:
  - source: </^[^.]+$>
    target: /index.html
    status: '200'
